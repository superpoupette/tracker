<!DOCTYPE html>
<html>
    <head>
        <title>Dance Tracker</title>
        <meta charset="utf-8" />
        <link rel="stylesheet" href="style/style.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="script/data.js" defer></script>
        <script src="script/dates.js" defer></script>
        <script src="script/script.js" defer></script>
        <script src="script/main.js" defer></script>
        <script src="script/supabase.js" defer></script>
    </head>
    <body>
        <div id="zoneChoreesEnCours">
        </div>

        <div id="zoneAjouterChoree">
            <p>Titre :</p>
            <input type="text" id="ajouterTitre" name="ajouterTitre">
            <p>Artiste :</p>
            <input type="text" id="ajouterArtiste" name="ajouterArtiste">
            <p>Duree :</p>
            <input type="text" id="ajouterDuree" name="ajouterDuree">
            <button id="BouttonAjouterChoree" type="button">Valider</button>  
        </div>

        <div id="week">
            <div id="lundi">
                <h1>Lundi</h1>
                <h2 id="dateLundi">date</h2>
                <button id="BouttonAjouterEvent" type="button">+</button>  
            </div>
            <div id="mardi">
                <h1>Mardi</h1>
                <h2 id="dateMardi">date</h2>
                <button id="BouttonAjouterEvent" type="button">+</button>  
            </div>
            <div id="mercredi">
                <h1>Mercredi</h1>
                <h2 id="dateMercredi">date</h2>
                <button id="BouttonAjouterEvent" type="button">+</button>  
            </div>
            <div id="jeudi">
                <h1>Jeudi</h1>
                <button id="BouttonAjouterEvent" type="button">+</button>  
            </div>
            <div id="vendredi">
                <h1>Vendredi</h1>
                <button id="BouttonAjouterEvent" type="button">+</button>  
            </div>
            <div id="samedi">
                <h1>Samedi</h1>
                <button id="BouttonAjouterEvent" type="button">+</button>  
            </div>
            <div id="dimanche">
                <h1>Dimanche</h1>
                <button id="BouttonAjouterEvent" type="button">+</button>  
            </div>
        </div>
          
    </body>
</html>
